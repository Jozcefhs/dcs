<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pay Admission Fees</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page-wrap narrow">
    <section class="card">
      <div class="form-header">
        <img src="images/logo.png" alt="Destiny Christian Academy" class="logo small" onerror="this.style.display='none'">
        <div>
          <h1>Pay Admission Fees</h1>
          <p class="muted">Use the same email address and verification code used for your admission application.</p>
        </div>
      </div>

      <form id="paymentLookupForm" autocomplete="on">
        <label for="email">Verification Email <span class="required">*</span></label>
        <input id="email" name="email" type="email" required>

        <label for="code">Verification Code <span class="required">*</span></label>
        <input id="code" name="code" type="text" required>

        <button type="submit" id="lookupBtn">Find Payable Fees</button>
        <p id="paymentStatus" class="status" aria-live="polite"></p>
      </form>

      <section id="feePanel" class="fee-panel" hidden>
        <div class="verified-box" id="accountSummary"></div>
        <fieldset>
          <legend>Available Fees</legend>
          <div id="feeList"></div>
        </fieldset>
        <button type="button" id="payBtn">Pay Selected Fee</button>
      </section>

      <p>
        <a href="index.html">Return to admission portal</a>
      </p>
    </section>
  </main>

  <script src="js/payments.js"></script>
</body>
</html>
