<!doctype html>
<html lang="en">

  <title>Payment Confirmation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

      <p>
        <a href="payments.html">Make another payment</a>
      </p>
      <p>
        <a href="index.html">Return to admission portal</a>

</html>
